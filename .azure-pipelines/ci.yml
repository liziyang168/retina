  - job: kubectl_retina_images
    displayName: Build Kubectl Retina Images
    timeoutInMinutes: 60
    strategy:
      matrix:
        amd64:
          arch: amd64
        arm64:
          arch: arm64
    pool:
      vmImage: ubuntu-latest
    steps:
